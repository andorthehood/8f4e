---
name: Deploy Example Modules to DigitalOcean Spaces

on:
  push:
    branches: [main]
    paths:
      - 'packages/examples/src/modules/**'
      - 'packages/examples/src/module-generators/**'
      - 'packages/examples/generate-example-registries.mjs'
      - 'packages/examples/project.json'
      - 'packages/examples/package.json'
      - '.github/workflows/deploy-example-modules.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DO_SPACES_BUCKET: ${{ vars.DO_SPACES_BUCKET }}
      DO_SPACES_REGION: ${{ vars.DO_SPACES_REGION }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npx nx run @8f4e/examples:build

      - name: Stage example module files
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/upload/example-modules"
          cd packages/examples/src/modules
          find . -type f -name '*.8f4em' \
            -exec cp --parents {} "$GITHUB_WORKSPACE/upload/example-modules/" \;
          cp "$GITHUB_WORKSPACE/packages/examples/dist/registries/example-modules.json" \
            "$GITHUB_WORKSPACE/upload/example-modules/registry.json"
          find "$GITHUB_WORKSPACE/upload/example-modules" -type f | sort

      - name: DigitalOcean Spaces Upload Action
        uses: BetaHuhn/do-spaces-action@v2.0.146
        with:
          access_key: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          secret_key: ${{ secrets.DO_SPACES_SECRET_KEY }}
          space_name: ${{ env.DO_SPACES_BUCKET }}
          space_region: ${{ env.DO_SPACES_REGION }}
          source: upload/example-modules
          out_dir: 8f4e/example-modules
