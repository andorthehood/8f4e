---
name: Deploy Example Modules to Cloudflare R2

on:
  push:
    branches: [main]
    paths:
      - 'packages/examples/src/modules/**'
      - 'packages/examples/src/module-generators/**'
      - 'packages/examples/generate-example-registries.mjs'
      - 'packages/examples/project.json'
      - 'packages/examples/package.json'
      - '.github/workflows/deploy-example-modules.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npx nx run @8f4e/examples:build

      - name: Stage example module files
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/upload/example-modules"
          cd packages/examples/src/modules
          find . -type f -name '*.8f4em' \
            -exec cp --parents {} "$GITHUB_WORKSPACE/upload/example-modules/" \;
          cp "$GITHUB_WORKSPACE/packages/examples/dist/registries/example-modules.json" \
            "$GITHUB_WORKSPACE/upload/example-modules/registry.json"
          find "$GITHUB_WORKSPACE/upload/example-modules" -type f | sort

      - name: Setup Cloudflare Wrangler
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: whoami

      - name: Upload example modules to Cloudflare R2
        run: |
          set -euo pipefail
          cd upload/example-modules
          find . -type f | while IFS= read -r file; do
            key="example-modules/${file#./}"
            npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET}/${key}" \
              --file "$file" \
              --remote \
              --cache-control "public, max-age=604800"
          done
