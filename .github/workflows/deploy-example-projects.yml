---
name: Deploy Example Projects to Cloudflare R2

on:
  push:
    branches: [main]
    paths:
      - 'packages/examples/src/projects/**'
      - 'packages/examples/src/module-generators/**'
      - 'packages/examples/generate-project-wasm.sh'
      - 'packages/examples/generate-example-registries.mjs'
      - 'packages/examples/project.json'
      - 'packages/examples/package.json'
      - 'packages/cli/**'
      - '.github/workflows/deploy-example-projects.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npx nx run @8f4e/examples:build

      - name: Stage example project files
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/upload/example-projects"
          cd packages/examples/src/projects
          find . -type f \( -name '*.8f4e' -o -name '*.wasm' \) \
            -exec cp --parents {} "$GITHUB_WORKSPACE/upload/example-projects/" \;
          cp "$GITHUB_WORKSPACE/packages/examples/dist/registries/example-projects.json" \
            "$GITHUB_WORKSPACE/upload/example-projects/registry.json"
          find "$GITHUB_WORKSPACE/upload/example-projects" -type f | sort

      - name: Upload example projects to Cloudflare R2
        run: |
          set -euo pipefail

          cd upload/example-projects
          find . -type f | while IFS= read -r file; do
            key="8f4e/example-projects/${file#./}"
            npx wrangler r2 object put "${CLOUDFLARE_R2_BUCKET}/${key}" \
              --file "$file" \
              --remote \
              --cache-control "public, max-age=604800"
          done
