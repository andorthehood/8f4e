---
name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Releases must be run from main. Current ref: $GITHUB_REF"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate release build
        run: npx nx run app:build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if git tag --list '*@*' | grep -q .; then
            npx nx release --skip-publish
          else
            npx nx release 0.1.0 --first-release --skip-publish
          fi

          npx nx run app:build
          node scripts/log-bundle-sizes.mjs

          if [[ -n "$(git status --porcelain -- logs/bundle-sizes)" ]]; then
            git add logs/bundle-sizes
            git commit -m "chore(release): record bundle sizes" --no-verify
          fi

          git push origin HEAD:main --follow-tags --no-verify --atomic
